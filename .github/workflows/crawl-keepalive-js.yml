name: crawl-keepalive-js

# JS-side keep-alive: runs scripts/ru_collector_playwright.py in a 5.5h
# bounded loop just like crawl-keepalive / crawl-allow-keepalive, but
# alternates per iteration between:
#   * --mode block (spravportal + getscam pages — bypasses JS challenges)
#   * --mode allow (yandex.ru/maps SERPs — adds business phones to
#                   datasets/ru/raw/legitimate_numbers.csv with
#                   source=yandex_maps / source_confidence=0.85)
#
# Output paths are designed so the existing pipeline picks them up
# without any additional plumbing:
#   * BLOCK rows → datasets/ru/raw/shards/js/raw.csv (+ evidence.csv).
#     merge_crawler_shards.py globs shards/*/raw.csv, so the new shard
#     gets merged into ru_reputation_raw.csv on the next consolidate tick.
#   * ALLOW rows → datasets/ru/raw/legitimate_numbers.csv (append-merge),
#     same file the existing crawl-allow-keepalive writes to.
#
# Why a separate workflow rather than folding into crawl-keepalive:
#   * Chromium install (~150 MB) takes ~30-45s on cold start. We only
#     pay this once per JS job.
#   * Playwright sessions are stateful and slower than aiohttp; mixing
#     them with the existing aiohttp-based shards would slow them down.
#   * Keeps the existing 3-shard matrix unchanged so the running
#     bessmertnyy-cycle stays untouched.

on:
  schedule:
    # Phase +30 minutes from reputation crawler (`0 */5 * * *`) and +15
    # minutes from allow-keepalive (`15 */5 * * *`) so we don't
    # cluster onto the same concurrent-jobs window.
    - cron: '30 */5 * * *'
  workflow_dispatch: {}
  push:
    # Restrict to the default branch so feature-branch pushes that touch the
    # listed paths don't accidentally fire the keep-alive loop on the PR
    # branch (where it would commit scraped data back to that branch).
    branches:
      - devin/1777391301-kd-distillation
      - main
    paths:
      - '.github/workflows/crawl-keepalive-js.yml'
      - 'scripts/ru_collector_playwright.py'

jobs:
  crawl-js:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 350
    concurrency:
      group: crawl-keepalive-js
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + deps
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet playwright requests beautifulsoup4 lxml aiohttp
          # Install only Chromium with system deps (~150MB) — no Firefox/WebKit.
          python -m playwright install --with-deps chromium

      - name: Setup rclone (Google Drive sync)
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set +e
          source scripts/drive_sync.sh
          drive_setup

      - name: Restore js shard + legitimate_numbers from Drive
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set +e
          source scripts/drive_sync.sh
          drive_pull_latest_archive "datasets/ru/raw/shards/js" \
            "данные_парсера/спам_номера_сырые/браузерные_js_spravportal_getscam" \
            "партии/спам/шард_js" \
            "batches/block/js" \
            "shards/js"
          mkdir -p datasets/ru/raw
          # legitimate_numbers.csv lives inside the allow batch archive — extract
          # the latest one into a stage dir, then copy the file into place.
          mkdir -p /tmp/allow_stage
          drive_pull_latest_archive "/tmp/allow_stage" \
            "данные_парсера/легальные_номера_сырые" \
            "партии/легальные" \
            "batches/allow" \
            "allow"
          if [ -f /tmp/allow_stage/legitimate_numbers.csv ]; then
            cp /tmp/allow_stage/legitimate_numbers.csv datasets/ru/raw/legitimate_numbers.csv
          fi
          ls -la datasets/ru/raw/shards/js datasets/ru/raw/legitimate_numbers.csv 2>/dev/null || true

      - name: Long-running JS collector loop
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          mkdir -p datasets/ru/raw/shards/js
          source scripts/drive_sync.sh

          # PR #3 speedup: was 66 iter @ 5 min, now 100 iter @ 3.3 min;
          # block-iter --max-urls 80 → 160; allow-iter --max-pairs 30 → 50.
          #
          # Upload to Drive on a randomized ~hourly timer (50-70 min jitter)
          # rather than every N iters. Each push is one tar.gz archive named
          # batch_<UTC_TS>.tar.gz, so Drive sees a single file per batch.
          MAX_ITERS=100
          last_push_ts=$(date +%s)
          next_push_after=$(( 50 * 60 + RANDOM % (20 * 60 + 1) ))
          for i in $(seq 1 ${MAX_ITERS}); do
            echo "::group::js-iter=${i} at $(date -u +%FT%TZ)"

            # Alternate: even → block (spravportal/getscam), odd → allow (yandex.maps)
            if [ $((i % 2)) -eq 0 ]; then
              python3 scripts/ru_collector_playwright.py \
                --mode block \
                --sources 'spravportal,getscam' \
                --max-urls 160 \
                || echo "block iter exited non-zero, continuing"
            else
              # PR #5: new yandex_maps collector — 2-stage (SERP → org pages),
              # ~6-10 sec per org with 4 parallel tabs.  --max-pairs cut from
              # 50 → 20 because each pair now spawns up to 5 org-page fetches
              # (~120 org pages / iter); with 4-way concurrency that's
              # ~3-5 min / iter, still well under the 100-iter budget.
              python3 scripts/ru_collector_playwright.py \
                --mode allow \
                --max-pairs 20 \
                --org-concurrency 4 \
                || echo "allow iter exited non-zero, continuing"
            fi
            echo "::endgroup::"

            # Push to Drive only when ~1h has elapsed since last push, or on
            # the final iter. Otherwise sleep and continue accumulating.
            now_ts=$(date +%s)
            elapsed=$(( now_ts - last_push_ts ))
            if (( elapsed < next_push_after )) && (( i != MAX_ITERS )); then
              sleep $((RANDOM % 5 + 2))
              continue
            fi
            echo "::group::drive-push-archive js after iter=${i} (elapsed=${elapsed}s, threshold=${next_push_after}s)"

            uploaded=0
            if drive_push_archive "datasets/ru/raw/shards/js" \
              "данные_парсера/спам_номера_сырые/браузерные_js_spravportal_getscam"; then
              uploaded=1
            fi
            # Stage just legitimate_numbers.csv into a temp dir and archive
            # that — keeps the allow tarball uniform with shard tarballs.
            if [ -f datasets/ru/raw/legitimate_numbers.csv ]; then
              rm -rf /tmp/allow_push && mkdir -p /tmp/allow_push
              cp datasets/ru/raw/legitimate_numbers.csv /tmp/allow_push/
              drive_push_archive "/tmp/allow_push" \
                "данные_парсера/легальные_номера_сырые" || true
            fi

            if [ "$uploaded" = "1" ]; then
              last_push_ts=$(date +%s)
              next_push_after=$(( 50 * 60 + RANDOM % (20 * 60 + 1) ))
              gh workflow run consolidate-assets.yml --ref "$GITHUB_REF_NAME" \
                || echo "gh workflow run failed, will rely on cron"
            fi
            echo "::endgroup::"

            sleep $((RANDOM % 5 + 2))
          done
