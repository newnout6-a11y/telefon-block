name: consolidate-assets

# Каждые 30 минут берёт то что shard-runner'ы накопили в
# datasets/ru/raw/shards/*, мержит в master ru_reputation_raw.csv,
# пересобирает spam_numbers.csv + prefix_risk.json, обновляет
# releases/latest/manifest.json. Юзерские APK через RemoteUpdateWorker
# подхватят новый manifest на следующем 6-часовом тике.
#
# Job короткий (~3-5 мин) => keep-alive не нужен.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}
  push:
    # Restrict to the default branch so PR-branch pushes don't trigger
    # consolidate-assets to commit rebuilt master CSVs into the PR branch.
    branches:
      - devin/1777391301-kd-distillation
      - main
    paths:
      - '.github/workflows/consolidate-assets.yml'
      - 'scripts/build_assets_from_dataset.py'
      - 'scripts/build_release_manifest.py'
      - 'scripts/merge_crawler_shards.py'
      - 'scripts/merge_legitimate_shards.py'
      - 'scripts/ru_metadata_dataset_builder.py'
      # Auto-fire after every shard commit so master/master-derived assets
      # stay fresh even if the GitHub free-tier `schedule` cron is delayed
      # or dropped (which it has been: only 2 schedule triggers fired in
      # ~50 minutes despite being configured at */30).
      - 'datasets/ru/raw/shards/**/raw.csv'
      # ALLOW-side conveyor: every commit to legitimate_numbers.csv from
      # crawl-allow-keepalive should rebuild the labeled dataset + assets so
      # the new whitelist-grade numbers reach RemoteUpdateWorker on the next
      # 6h tick. Side effect: if user ever edits whitelist_official_ru.csv
      # by hand and pushes, that also re-runs consolidate. Both wanted.
      - 'datasets/ru/raw/legitimate_numbers.csv'
      - 'datasets/ru/raw/whitelist_official_ru.csv'

# (touch to retrigger after upstream-shard fix; old workflows committed via
# GITHUB_TOKEN which doesn't fire push.paths triggers — see crawl-keepalive
# workflow for the gh-workflow-run poke that bypasses this restriction.)
concurrency:
  group: consolidate-assets
  # Queue subsequent dispatches instead of cancelling the in-flight run.
  # With 13 dispatch sources (5 BLOCK shards + 5 ALLOW keepalive shards +
  # 2 ALLOW daily shards + 1 BLOCK js shard) firing every 4-6 min and
  # consolidate taking ~20 min per merge, `cancel-in-progress: true` was
  # killing ~50% of runs mid-merge and ALLOW master fell behind shard data
  # on Drive. Queueing instead lets every shard's contribution land.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: pip install --quiet requests beautifulsoup4 lxml pandas numpy

      - name: Setup rclone (Google Drive sync)
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set +e
          source scripts/drive_sync.sh
          drive_setup

      - name: Download all shards + ALLOW data from Drive
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set +e
          source scripts/drive_sync.sh
          mkdir -p datasets/ru/raw/shards datasets/ru/raw
          # Pull the latest batch_<UTC_TS>.tar.gz per shard from Drive and
          # extract it into datasets/ru/raw/shards/<shard>/. The 3rd arg to
          # drive_pull_latest_archive is the legacy folder used before the
          # batches/{block,allow,ready} layout migration — kept for one or
          # two waves of transition while old archives in shards/* are still
          # the freshest data we have. Eventually the legacy paths can be
          # dropped.
          # Mapping: shard ID -> descriptive Drive folder name.  Keeps the
          # workflow matrix's compact a/b/c/d/js IDs (used in local paths,
          # state.json keys) while giving the human-facing Drive layout
          # source-named folders so the user can tell at a glance what each
          # shard scrapes.
          declare -A SHARD_DIR=(
            [a]="сайты_a_callfilter_zvonili"
            [b]="сайты_b_znum_prozvonok"
            [c]="сайты_c_zvonkoff_ktozvonil"
            [d]="сайты_d_phoneregion"
            [e]="сайты_e_callfilter_info_scamcall"
            [f]="сайты_f_phase25_aggregators"
            [js]="браузерные_js_spravportal_getscam"
          )
          for shard in a b c d e f js; do
            # Multi-level fallback: new layout (PR #10) -> PR #9 -> PR #6-#8
            # -> raw drive_push files (pre-PR-#5).  Whichever has the freshest
            # archive wins.  Critical during cutover: the in-flight collector
            # wave on the previous code revision still writes to its own era's
            # path, which we'd otherwise miss.
            drive_pull_latest_archive "datasets/ru/raw/shards/${shard}" \
              "данные_парсера/спам_номера_сырые/${SHARD_DIR[$shard]}" \
              "партии/спам/шард_${shard}" \
              "batches/block/${shard}" \
              "shards/${shard}"
          done
          # ALLOW data: shards from crawl-allow-keepalive (org-fed,
          # org-civic, catalogs, geo, weak) and crawl-allow-osm-wikidata
          # (osm, wikidata). Each shard has its own Drive folder and ships
          # tar.gz with legitimate.csv (+ optional state.json). After all
          # shards are pulled, merge_legitimate_shards.py concatenates them
          # into the master datasets/ru/raw/legitimate_numbers.csv.
          declare -A ALLOW_SHARD_DIR=(
            [org-fed]="легальные_org_fed"
            [org-civic]="легальные_org_civic"
            [catalogs]="легальные_catalogs"
            [geo]="легальные_geo"
            [weak]="легальные_weak"
            [osm]="легальные_osm"
            [osm-bulk]="легальные_osm_bulk"
            [wikidata]="легальные_wikidata"
          )
          mkdir -p datasets/ru/raw/legitimate_shards
          for ashard in org-fed org-civic catalogs geo weak osm osm-bulk wikidata; do
            ashard_dir="datasets/ru/raw/legitimate_shards/${ashard}"
            mkdir -p "${ashard_dir}"
            drive_pull_latest_archive "${ashard_dir}" \
              "данные_парсера/легальные_номера_сырые/${ALLOW_SHARD_DIR[$ashard]}" \
              "партии/легальные/шард_${ashard}" \
              "batches/allow/${ashard}" \
              "allow_shards/${ashard}"
          done
          # Legacy single-batch ALLOW layout (pre-shard PR): pull whatever
          # the old workflow pushed and stage as a synthetic 'legacy' shard
          # so its data still feeds the merge during the cutover wave.
          legacy_dir="datasets/ru/raw/legitimate_shards/legacy"
          mkdir -p "${legacy_dir}"
          rm -rf /tmp/allow_stage && mkdir -p /tmp/allow_stage
          drive_pull_latest_archive "/tmp/allow_stage" \
            "данные_парсера/легальные_номера_сырые" \
            "партии/легальные" \
            "batches/allow" \
            "allow"
          if [ -f /tmp/allow_stage/legitimate_numbers.csv ]; then
            cp /tmp/allow_stage/legitimate_numbers.csv "${legacy_dir}/legitimate.csv"
          fi
          echo "--- shard inventory ---"
          for shard in a b c d e f js; do
            f="datasets/ru/raw/shards/${shard}/raw.csv"
            if [ -f "$f" ]; then
              printf '  %s: %s rows\n' "$shard" "$(wc -l < "$f")"
            else
              printf '  %s: missing\n' "$shard"
            fi
          done
          for ashard in org-fed org-civic catalogs geo weak osm osm-bulk wikidata legacy; do
            f="datasets/ru/raw/legitimate_shards/${ashard}/legitimate.csv"
            if [ -f "$f" ]; then
              printf '  allow/%s: %s rows\n' "$ashard" "$(wc -l < "$f")"
            else
              printf '  allow/%s: missing\n' "$ashard"
            fi
          done

      - name: Merge BLOCK shard CSVs into master
        run: python3 scripts/merge_crawler_shards.py

      - name: Merge ALLOW shard CSVs into master
        run: python3 scripts/merge_legitimate_shards.py

      - name: Rebuild dataset (master raw → labeled → features)
        id: dataset_builder
        continue-on-error: true
        run: |
          # dataset_builder now runs against multi-million-row raw snapshots.
          # The job timeout is intentionally high enough to include Drive
          # download, shard merges, dataset rebuild, asset staging, and uploads.
          # No inner timeout: cutting this step mid-write previously produced
          # half-sized ru_numbers_labeled.csv and stale downstream Drive batches.
          # continue-on-error=true keeps the workflow alive if the script
          # genuinely crashes; the dependent steps below are gated on
          # steps.dataset_builder.outcome so partial outputs never reach Drive.
          python3 scripts/ru_metadata_dataset_builder.py

      - name: Rebuild app assets (spam_numbers.csv + prefix_risk.json)
        if: steps.dataset_builder.outcome == 'success'
        run: |
          if [ -f datasets/ru/processed/ru_numbers_labeled.csv ]; then
            python3 scripts/build_assets_from_dataset.py
          else
            echo "labeled dataset missing; skipping asset rebuild"
          fi

      - name: Stage assets into releases/latest/
        if: steps.dataset_builder.outcome == 'success'
        run: |
          mkdir -p releases/latest
          for f in \
            spam_numbers.csv \
            prefix_risk.json \
            prefix_histogram.json \
            prefix_histogram_3.json \
            prefix_histogram_7.json \
            def_code_risk.json \
            def_code_operator_risk.json \
            operator_bucket.json \
            spam_model.tflite \
            model_card.json; do
            if [ -f "app/src/main/assets/$f" ]; then
              cp "app/src/main/assets/$f" "releases/latest/$f"
            fi
          done

      - name: Regenerate manifest.json
        if: steps.dataset_builder.outcome == 'success'
        run: python3 scripts/build_release_manifest.py

      - name: Upload master CSVs + assets to Drive
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set +e
          source scripts/drive_sync.sh
          # Stage each group into its own temp dir and ship as one
          # batch_<UTC_TS>.tar.gz via drive_push_archive. All three
          # consolidated outputs land under данные_парсера/итог_для_обучения/...
          # so the Drive folder structure mirrors the requested layout:
          #   данные_парсера/спам_номера_сырые/сайты_<x>_*/      — raw block-side scrapes per shard
          #   данные_парсера/легальные_номера_сырые/        — raw allow-side scrapes
          #   данные_парсера/итог_для_обучения/все_номера_с_метками/  — consolidated training tables
          #   данные_парсера/итог_для_обучения/обученная_ml_модель/      — trained model + metadata
          #   данные_парсера/итог_для_обучения/android_релиз_манифест/   — Android release bundle

          # Master raw + evidence + labeled + features → данные_парсера/итог_для_обучения/все_номера_с_метками
          # Always-safe files (raw/evidence/legitimate) come from the merge
          # steps which are independent of dataset_builder. labeled/features
          # come from dataset_builder itself — only ship them if it succeeded,
          # otherwise we'd push half-written CSVs to Drive and shrink the
          # downstream training set.
          rm -rf /tmp/master_push && mkdir -p /tmp/master_push
          for f in ru_reputation_raw.csv ru_reputation_evidence.csv legitimate_numbers.csv; do
            if [ -f "datasets/ru/raw/$f" ]; then
              cp "datasets/ru/raw/$f" "/tmp/master_push/$f"
            elif [ -f "datasets/ru/processed/$f" ]; then
              cp "datasets/ru/processed/$f" "/tmp/master_push/$f"
            fi
          done
          if [ "${{ steps.dataset_builder.outcome }}" = "success" ]; then
            for f in ru_numbers_labeled.csv; do
              if [ -f "datasets/ru/raw/$f" ]; then
                cp "datasets/ru/raw/$f" "/tmp/master_push/$f"
              elif [ -f "datasets/ru/processed/$f" ]; then
                cp "datasets/ru/processed/$f" "/tmp/master_push/$f"
              fi
            done
          else
            echo "dataset_builder did not succeed — skipping labeled/features in master_push to avoid uploading partial CSVs"
          fi
          drive_push_archive "/tmp/master_push" \
            "данные_парсера/итог_для_обучения/все_номера_с_метками" || echo "master archive upload failed"

          # App assets — trained model + metadata → обученная_ml_модель
          # Skip when dataset_builder failed: the assets in app/src/main/assets/
          # are committed in git from a previous successful run, so they're
          # stale-but-valid — we'd rather keep Drive's last-known-good copy
          # than overwrite it with a half-built model.
          if [ "${{ steps.dataset_builder.outcome }}" = "success" ]; then
            rm -rf /tmp/assets_push && mkdir -p /tmp/assets_push
            for f in \
              spam_numbers.csv \
              prefix_risk.json \
              prefix_histogram.json \
              prefix_histogram_3.json \
              prefix_histogram_7.json \
              def_code_risk.json \
              def_code_operator_risk.json \
              operator_bucket.json \
              spam_model.tflite \
              model_card.json; do
              if [ -f "app/src/main/assets/$f" ]; then
                cp "app/src/main/assets/$f" "/tmp/assets_push/$f"
              fi
            done
            drive_push_archive "/tmp/assets_push" \
              "данные_парсера/итог_для_обучения/обученная_ml_модель" || echo "model archive upload failed"

            # Release manifest + bundled assets → android_релиз_манифест
            rm -rf /tmp/releases_push && mkdir -p /tmp/releases_push
            if [ -f releases/latest/manifest.json ]; then
              cp releases/latest/manifest.json /tmp/releases_push/manifest.json
            fi
            for f in \
              spam_numbers.csv \
              prefix_risk.json \
              prefix_histogram.json \
              prefix_histogram_3.json \
              prefix_histogram_7.json \
              def_code_risk.json \
              def_code_operator_risk.json \
              operator_bucket.json \
              spam_model.tflite \
              model_card.json; do
              if [ -f "releases/latest/$f" ]; then
                cp "releases/latest/$f" "/tmp/releases_push/$f"
              fi
            done
            drive_push_archive "/tmp/releases_push" \
              "данные_парсера/итог_для_обучения/android_релиз_манифест" || echo "release archive upload failed"
          else
            echo "dataset_builder did not succeed — skipping model + release manifest uploads to keep Drive's last good copies intact"
          fi

          echo "consolidate finished at $(date -u +%FT%TZ)"
